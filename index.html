<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TikTok Live Wordle</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  
  <!-- Dynamic Background Wrapper -->
  <div class="bg-layer" id="bgLayer"></div>
  <div class="glass-overlay"></div>

  <!-- Connection Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">🎮</div>
      <h1>TIKTOK WORDLE</h1>
      <p>Enter TikTok username to start</p>
      <div class="input-group">
        <span class="at-symbol">@</span>
        <input type="text" id="usernameInput" placeholder="username" autocomplete="off">
      </div>
      <button id="connectBtn" onclick="connectToLive()">Connect to Live</button>
      <div id="loginStatus" class="status-msg"></div>
    </div>
  </div>

  <!-- Main Game Area -->
  <div class="game-container" id="gameContainer" style="display: none;">
    <header>
      <div class="header-left">
        <div class="room-info">
          <div class="live-badge">LIVE</div>
          <span id="roomHost">@username</span>
        </div>
      </div>
      <div class="header-title">WORDLE</div>
      <div class="header-right">
        <div class="round-badge">Round <span id="roundNumber">1</span></div>
      </div>
    </header>

    <!-- Music Player Widget -->
    <div class="music-widget" id="musicWidget">
      <div id="ytPlayerContainer"></div>
      <img id="musicThumb" src="" alt="Album Art">
      <div class="music-info">
        <div class="music-title" id="musicTitle">Song Title</div>
        <div class="music-requester">Req by <span id="musicRequester">@user</span></div>
      </div>
    </div>

    <div class="instruction">Type a 5-letter word in chat to guess!</div>

    <!-- Hint Board -->
    <div class="hint-container">
      <div class="hint-label">HINTS DISCOVERED</div>
      <div class="hint-board" id="hintBoard">
        <!-- Generated dynamically in app.js -->
      </div>
    </div>

    <!-- Wordle Board -->
    <div class="board-container">
      <div id="board"></div>
    </div>

    <!-- Notifications -->
    <div id="toastContainer" class="toast-container"></div>
  </div>

  <!-- Aesthetic Win Overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-avatar-container">
        <img id="winAvatar" src="" alt="Winner">
        <div class="crown-icon">👑</div>
      </div>
      <div class="win-title">WE HAVE A WINNER!</div>
      <div class="win-name" id="winName">@username</div>
      <div class="win-divider"></div>
      <div class="win-subtitle">Guessed the word:</div>
      <div class="win-word" id="winWord">APPLE</div>
      <div class="win-footer">Next round starting soon...</div>
    </div>
  </div>

  <!-- Host Music Control -->
  <div class="host-music-control" id="hostMusicControl" style="display: none;">
    <button id="hostSkipBtn" class="host-music-btn" style="display: none;" title="Skip Song">⏭️</button>
    <div class="host-music-input" id="hostMusicInputContainer">
      <input type="text" id="hostMusicInput" placeholder="Type song name..." autocomplete="off">
    </div>
    <button id="hostMusicBtn" class="host-music-btn" title="Request Song">🎵</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
